<svg width="256" height="256" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" fill="transparent"/>
  
  <!-- Outer/back petals - true iris structure with falls -->
  <path d="M 60 25 Q 45 50 42 80 Q 40 105 55 125 Q 75 105 78 80 Q 75 50 60 25" fill="#3DAA7A" opacity="0.6"/>
  
  <path d="M 30 55 Q 8 75 8 105 Q 12 125 28 130 Q 40 105 42 80 Q 40 65 35 50" fill="#3DAA7A" opacity="0.55" transform="rotate(-70 35 85)"/>
  
  <path d="M 90 55 Q 112 75 112 105 Q 108 125 92 130 Q 80 105 78 80 Q 80 65 85 50" fill="#3DAA7A" opacity="0.55" transform="rotate(70 85 85)"/>
  
  <!-- Standards (upright petals) - more prominent -->
  <path d="M 60 20 Q 50 35 48 60 Q 47 82 55 110 L 65 110 Q 73 82 72 60 Q 70 35 60 20" fill="#3DAA7A" opacity="0.95" stroke="#2A7A57" stroke-width="0.6" stroke-opacity="0.4"/>
  
  <path d="M 35 45 Q 18 62 15 88 Q 16 108 26 120 L 38 105 Q 42 82 45 60 Q 46 50 42 40" fill="#3DAA7A" opacity="0.9" stroke="#2A7A57" stroke-width="0.6" stroke-opacity="0.4" transform="rotate(-65 35 75)"/>
  
  <path d="M 85 45 Q 102 62 105 88 Q 104 108 94 120 L 82 105 Q 78 82 75 60 Q 74 50 78 40" fill="#3DAA7A" opacity="0.9" stroke="#2A7A57" stroke-width="0.6" stroke-opacity="0.4" transform="rotate(65 85 75)"/>
  
  <!-- Beard (fuzzy lines along falls) - more detailed -->
  <g opacity="0.5">
    <line x1="45" y1="75" x2="42" y2="78" stroke="#3DAA7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="48" y1="80" x2="45" y2="84" stroke="#3DAA7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="52" y1="88" x2="50" y2="92" stroke="#3DAA7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="60" y1="95" x2="60" y2="100" stroke="#3DAA7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="68" y1="88" x2="70" y2="92" stroke="#3DAA7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="72" y1="80" x2="75" y2="84" stroke="#3DAA7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="75" y1="75" x2="78" y2="78" stroke="#3DAA7A" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- Signal spot (darker area on falls) -->
  <ellipse cx="45" cy="92" rx="4" ry="6" fill="#2A7A57" opacity="0.4"/>
  <ellipse cx="75" cy="92" rx="4" ry="6" fill="#2A7A57" opacity="0.4"/>
  
  <!-- Inner structures - more defined -->
  <ellipse cx="60" cy="68" rx="14" ry="7" fill="#3DAA7A" opacity="0.35"/>
  
  <!-- Stigma (style arms) -->
  <path d="M 55 70 Q 53 75 54 80" fill="none" stroke="#3DAA7A" stroke-width="0.7" opacity="0.6" stroke-linecap="round"/>
  <path d="M 60 70 L 60 78" fill="none" stroke="#3DAA7A" stroke-width="0.7" opacity="0.6" stroke-linecap="round"/>
  <path d="M 65 70 Q 67 75 66 80" fill="none" stroke="#3DAA7A" stroke-width="0.7" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Stamen/anther center -->
  <circle cx="60" cy="75" r="6" fill="#1C1F1E" stroke="#3DAA7A" stroke-width="1.5"/>
  <circle cx="60" cy="75" r="3" fill="#3DAA7A" opacity="0.7"/>
  
  <!-- Veining detail on front petal -->
  <line x1="58" y1="40" x2="58" y2="65" stroke="#3DAA7A" stroke-width="0.4" opacity="0.3"/>
  <line x1="60" y1="38" x2="60" y2="68" stroke="#3DAA7A" stroke-width="0.4" opacity="0.3"/>
  <line x1="62" y1="40" x2="62" y2="65" stroke="#3DAA7A" stroke-width="0.4" opacity="0.3"/>
</svg>
